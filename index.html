<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 3D - Sistema de Usuários</title>
    <style>
        /* ====== BASE E LAYOUT ====== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }

        h2, h3, h4 { margin-top: 0; }

        /* ====== CONTROLE DE TELAS ====== */
        .tela { display: none; }
        .tela.ativa { display: block; animation: fadeInTela 0.3s ease-in; }

        @keyframes fadeInTela {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== BOTÕES ====== */
        button {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
        }
        button:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .btn-secundario { background: #444; }
        .btn-sucesso { background: linear-gradient(to right, #11998e, #38ef7d); }
        .btn-acao { padding: 8px 12px; font-size: 14px; margin: 0 5px; }

        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            text-align: center;
            width: 120px;
        }

        /* ====== CARTÕES DE HISTÓRICO ====== */
        .card-jogo {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-info h4 { margin: 0 0 5px 0; color: #ff4b2b; }
        .card-info p { margin: 0; font-size: 14px; color: #ccc; }

        /* ====== PALCO 3D DA BOLA ====== */
        .palco-3d {
            perspective: 800px;
            width: 160px; 
            height: 160px;
            margin: 30px auto;
            position: relative;
        }

        .fundo-bola, .luz-sombra, .eixo-3d {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
        }

        .fundo-bola { background-color: #ff4b2b; }

        .luz-sombra {
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5) 0%, transparent 40%),
                        radial-gradient(circle at 65% 65%, transparent 40%, rgba(0,0,0,0.8) 100%);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), 0 15px 25px rgba(0,0,0,0.4);
            z-index: 10;
            pointer-events: none;
        }

        .eixo-3d { transform-style: preserve-3d; }

        .face-numero {
            position: absolute;
            width: 80px; height: 80px;
            background: white; border-radius: 50%;
            top: 40px; left: 40px;
            transform: translateZ(80px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
            backface-visibility: hidden;
        }

        .face-numero span { font-size: 40px; font-weight: bold; color: #ff4b2b; transition: opacity 0.2s; }

        .girando { animation: rolarFrente 0.25s linear infinite; }

        @keyframes rolarFrente {
            from { transform: rotateX(0deg); }
            to { transform: rotateX(-360deg); }
        }

        /* ====== CAIXA DE NÚMEROS SORTEADOS ====== */
        .historico-container {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }
        .numero-sorteado {
            display: inline-block;
            padding: 8px 12px;
            background-color: #ff4b2b;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            margin: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎱 Bingo 3D</h2>

        <div id="tela-login" class="tela ativa">
            <h3>Selecione sua conta:</h3>
            <div id="lista-usuarios" style="margin-top: 20px;">
                </div>
        </div>

        <div id="tela-menu" class="tela">
            <h3 id="bem-vindo-texto" style="color: #00d2ff;"></h3>
            
            <button onclick="mudarTela('tela-historico')" class="btn-secundario" style="margin-bottom: 25px; width: 100%;">
                📜 Ver Meus Jogos Anteriores
            </button>

            <h4>Começar um Novo Jogo:</h4>
            <div style="margin-bottom: 20px;">
                <button onclick="iniciarNovoJogo(50)">1 a 50</button>
                <button onclick="iniciarNovoJogo(75)">1 a 75</button>
                <button onclick="iniciarNovoJogo(100)">1 a 100</button>
                <button onclick="mostrarDivPersonalizado()">Personalizado</button>
            </div>

            <div id="div-personalizado" style="display: none; margin-bottom: 20px;">
                <input type="number" id="input-limite" placeholder="Ex: 200">
                <button onclick="iniciarJogoPersonalizado()">Criar</button>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <button onclick="fazerLogout()" style="background: transparent; border: 1px solid #555; color: #ccc;">Sair da Conta</button>
        </div>

        <div id="tela-historico" class="tela">
            <button onclick="mudarTela('tela-menu')" class="btn-secundario" style="margin-bottom: 20px;">⬅️ Voltar ao Menu</button>
            
            <h3>Seu Histórico de Jogos</h3>
            <div id="lista-jogos-salvos" style="max-height: 400px; overflow-y: auto; margin-top: 20px;">
                </div>
        </div>

        <div id="tela-jogo" class="tela">
            <button onclick="mudarTela('tela-menu')" class="btn-secundario" style="margin-bottom: 10px;">⬅️ Voltar ao Menu</button>
            <p style="font-size: 12px; color: #aaa; margin-top: 0;">(O jogo é salvo automaticamente)</p>
            
            <h3 id="titulo-jogo"></h3>
            
            <div class="palco-3d">
                <div class="fundo-bola"></div>
                <div class="eixo-3d" id="eixo-bola">
                    <div class="face-numero">
                        <span id="numero-atual">?</span>
                    </div>
                </div>
                <div class="luz-sombra"></div>
            </div>
            
            <button id="btn-sortear" onclick="sortearNumero()" class="btn-sucesso" style="padding: 15px 30px; font-size: 20px; margin-bottom: 15px;">
                Sortear Número
            </button>

            <div class="historico-container">
                <h4 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px;">
                    Números Sorteados (<span id="contador">0</span>/<span id="total">0</span>):
                </h4>
                <div id="lista-sorteados"></div>
            </div>
        </div>
    </div>

    <script>
        // --- BANCO DE DADOS (Simulado) ---
        const usuarios = [
            { id: 1, nome: "Luiz Leão" }
            // Para adicionar mais no futuro, basta colocar vírgula e: { id: 2, nome: "João" }
        ];

        let usuarioAtual = null;
        let jogoAtual = null; // Guarda o objeto do jogo que está rolando
        let sorteando = false; // Trava do botão 3D

        // Carrega os jogos do localStorage (se não tiver, cria um array vazio)
        let todosOsJogos = JSON.parse(localStorage.getItem('bingo_historico_jogos')) || [];

        // --- NAVEGAÇÃO DE TELAS ---
        function mudarTela(idTelaAlvo) {
            document.querySelectorAll('.tela').forEach(tela => tela.classList.remove('ativa'));
            document.getElementById(idTelaAlvo).classList.add('ativa');

            if (idTelaAlvo === 'tela-historico') {
                renderizarHistoricoJogos();
            }
        }

        // --- SISTEMA DE LOGIN ---
        function renderizarUsuarios() {
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = '';
            usuarios.forEach(user => {
                const btn = document.createElement('button');
                btn.innerText = `👤 Entrar como ${user.nome}`;
                btn.style.width = '100%';
                btn.onclick = () => fazerLogin(user);
                container.appendChild(btn);
            });
        }

        function fazerLogin(user) {
            usuarioAtual = user;
            document.getElementById('bem-vindo-texto').innerText = `Olá, ${user.nome}!`;
            mudarTela('tela-menu');
        }

        function fazerLogout() {
            usuarioAtual = null;
            mudarTela('tela-login');
        }

        // --- GERENCIAMENTO DE JOGOS ---
        function salvarNoBanco() {
            localStorage.setItem('bingo_historico_jogos', JSON.stringify(todosOsJogos));
        }

        function iniciarNovoJogo(limite) {
            // Cria a "ficha" do novo jogo
            const novoJogo = {
                id: Date.now(), // Gera um ID único baseado na data/hora atual
                idUsuario: usuarioAtual.id,
                limite: limite,
                sorteados: [],
                dataCriacao: new Date().toLocaleString('pt-BR')
            };

            todosOsJogos.push(novoJogo);
            salvarNoBanco();
            
            carregarJogoNaTela(novoJogo);
        }

        function mostrarDivPersonalizado() {
            document.getElementById('div-personalizado').style.display = 'block';
        }

        function iniciarJogoPersonalizado() {
            const limite = parseInt(document.getElementById('input-limite').value);
            if (limite > 1) {
                iniciarNovoJogo(limite);
                document.getElementById('div-personalizado').style.display = 'none';
                document.getElementById('input-limite').value = '';
            } else {
                alert("Por favor, insira um número válido.");
            }
        }

        function carregarJogoNaTela(jogo) {
            jogoAtual = jogo;
            mudarTela('tela-jogo');
            
            document.getElementById('titulo-jogo').innerText = `Bingo (1 a ${jogo.limite})`;
            document.getElementById('total').innerText = jogo.limite;
            
            // Se já tiver número sorteado (caso de continuar jogo), mostra o último. Se não, mostra "?"
            if (jogo.sorteados.length > 0) {
                // Pegando a ordem cronológica real salva (antes de ordenar numericamente para a tela)
                document.getElementById('numero-atual').innerText = jogo.sorteados[jogo.sorteados.length - 1];
            } else {
                document.getElementById('numero-atual').innerText = '?';
            }

            atualizarPlacarSorteados();
            verificarStatusBotao();
        }

        // --- LÓGICA DO SORTEIO 3D ---
        function sortearNumero() {
            if (sorteando || !jogoAtual) return; 

            if (jogoAtual.sorteados.length >= jogoAtual.limite) {
                alert("Todos os números já foram sorteados!");
                return;
            }

            sorteando = true;
            const btnSortear = document.getElementById('btn-sortear');
            btnSortear.disabled = true;
            btnSortear.innerText = "Sorteando...";
            
            document.getElementById('numero-atual').style.opacity = '0';
            const eixo = document.getElementById('eixo-bola');
            eixo.classList.add('girando');

            // Lógica para não repetir número
            let novoSorteio;
            do {
                novoSorteio = Math.floor(Math.random() * jogoAtual.limite) + 1;
            } while (jogoAtual.sorteados.includes(novoSorteio));

            // Salva no jogo atual e atualiza o banco de dados
            jogoAtual.sorteados.push(novoSorteio);
            salvarNoBanco();

            setTimeout(() => {
                eixo.classList.remove('girando');
                
                document.getElementById('numero-atual').innerText = novoSorteio;
                document.getElementById('numero-atual').style.opacity = '1';
                
                atualizarPlacarSorteados();
                verificarStatusBotao();

                sorteando = false;
            }, 1200);
        }

        function atualizarPlacarSorteados() {
            document.getElementById('contador').innerText = jogoAtual.sorteados.length;
            
            // Cria uma cópia do array e ordena do menor pro maior só visualmente
            const arrayOrdenado = [...jogoAtual.sorteados].sort((a, b) => a - b);
            
            const listaHtml = arrayOrdenado.map(num => `<span class="numero-sorteado">${num}</span>`).join('');
            document.getElementById('lista-sorteados').innerHTML = listaHtml;
        }

        function verificarStatusBotao() {
            const btnSortear = document.getElementById('btn-sortear');
            if (jogoAtual.sorteados.length >= jogoAtual.limite) {
                btnSortear.disabled = true;
                btnSortear.innerText = "Sorteio Finalizado";
            } else {
                btnSortear.disabled = false;
                btnSortear.innerText = "Sortear Número";
            }
        }

        // --- LÓGICA DA TELA DE HISTÓRICO ---
        function renderizarHistoricoJogos() {
            const container = document.getElementById('lista-jogos-salvos');
            container.innerHTML = '';

            // Filtra apenas os jogos do usuário logado e inverte a ordem (mais recentes primeiro)
            const jogosDoUsuario = todosOsJogos.filter(j => j.idUsuario === usuarioAtual.id).reverse();

            if (jogosDoUsuario.length === 0) {
                container.innerHTML = '<p style="color: #ccc;">Nenhum jogo encontrado.</p>';
                return;
            }

            jogosDoUsuario.forEach(jogo => {
                const finalizado = jogo.sorteados.length === jogo.limite;
                const card = document.createElement('div');
                card.className = 'card-jogo';
                
                // Estrutura visual do jogo na lista
                card.innerHTML = `
                    <div class="card-info">
                        <h4>Bingo de 1 a ${jogo.limite}</h4>
                        <p>🗓️ ${jogo.dataCriacao}</p>
                        <p>🎱 Sorteados: ${jogo.sorteados.length} / ${jogo.limite}</p>
                    </div>
                    <div>
                        <button class="${finalizado ? 'btn-secundario' : 'btn-sucesso'} btn-acao" onclick="retomarJogo(${jogo.id})">
                            ${finalizado ? '👁️ Ver Números' : '▶️ Continuar'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Função chamada pelo botão de continuar/ver no histórico
        function retomarJogo(idDoJogo) {
            const jogoEncontrado = todosOsJogos.find(j => j.id === idDoJogo);
            if (jogoEncontrado) {
                carregarJogoNaTela(jogoEncontrado);
            }
        }

        // --- INICIALIZAÇÃO ---
        renderizarUsuarios();

    </script>
</body>
</html>
