<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 3D</title>
    <style>
        /* BASE E LAYOUT */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }

        h2, h3, h4 { margin-top: 0; }

        /* BOTÕES */
        button {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
        }
        button:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            text-align: center;
            width: 120px;
        }

        /* PALCO 3D DA BOLA */
        .palco-3d {
            perspective: 800px; /* Define a profundidade do 3D */
            width: 160px; 
            height: 160px;
            margin: 30px auto;
            position: relative;
        }

        /* Camadas da Bola */
        .fundo-bola, .luz-sombra, .eixo-3d {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
        }

        /* A cor vermelha de fundo que fica parada */
        .fundo-bola {
            background-color: #ff4b2b;
        }

        /* A luz e a sombra que ficam por cima de tudo para dar a ilusão redonda */
        .luz-sombra {
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5) 0%, transparent 40%),
                        radial-gradient(circle at 65% 65%, transparent 40%, rgba(0,0,0,0.8) 100%);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), 0 15px 25px rgba(0,0,0,0.4);
            z-index: 10;
            pointer-events: none; /* Deixa os cliques passarem */
        }

        /* O eixo que realmente vai girar o conteúdo */
        .eixo-3d {
            transform-style: preserve-3d;
        }

        /* Círculo branco que abriga o número */
        .face-numero {
            position: absolute;
            width: 80px; 
            height: 80px;
            background: white; 
            border-radius: 50%;
            top: 40px; left: 40px; /* Centraliza (160 - 80) / 2 */
            transform: translateZ(80px); /* Empurra o círculo para a superfície da bola 3D */
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
            backface-visibility: hidden; /* Oculta quando gira para trás da bola */
        }

        /* O Texto do Número */
        .face-numero span {
            font-size: 40px; 
            font-weight: bold; 
            color: #ff4b2b;
            transition: opacity 0.2s;
        }

        /* ANIMAÇÃO DO GIRO 3D (Na direção do usuário) */
        .girando {
            animation: rolarFrente 0.25s linear infinite; /* Roda super rápido */
        }

        @keyframes rolarFrente {
            from { transform: rotateX(0deg); }
            to { transform: rotateX(-360deg); } /* Eixo X negativo rola na sua direção */
        }

        /* CAIXA DE HISTÓRICO */
        .historico-container {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            min-height: 80px;
        }
        .numero-sorteado {
            display: inline-block;
            padding: 8px 12px;
            background-color: #ff4b2b;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            margin: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        #tela-jogo { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎱 Bingo 3D</h2>

        <div id="tela-menu">
            <h3>Escolha o tipo de Bingo:</h3>
            <div style="margin-bottom: 20px;">
                <button onclick="iniciarJogo(50)">1 a 50</button>
                <button onclick="iniciarJogo(75)">1 a 75</button>
                <button onclick="iniciarJogo(100)">1 a 100</button>
                <button onclick="mostrarPersonalizado()">Personalizado</button>
            </div>

            <div id="div-personalizado" style="display: none;">
                <input type="number" id="input-limite" placeholder="Ex: 200">
                <button onclick="iniciarPersonalizado()">Começar</button>
            </div>
        </div>

        <div id="tela-jogo">
            <button onclick="voltarMenu()" style="background: #444; margin-bottom: 10px;">⬅️ Voltar ao Menu</button>
            
            <h3 id="titulo-jogo"></h3>
            
            <div class="palco-3d">
                <div class="fundo-bola"></div>
                
                <div class="eixo-3d" id="eixo-bola">
                    <div class="face-numero">
                        <span id="numero-atual">?</span>
                    </div>
                </div>

                <div class="luz-sombra"></div>
            </div>
            
            <button id="btn-sortear" onclick="sortearNumero()" style="padding: 15px 30px; font-size: 20px; background: linear-gradient(to right, #11998e, #38ef7d); margin-bottom: 15px;">
                Sortear Número
            </button>

            <div class="historico-container">
                <h4 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px;">
                    Números Sorteados (<span id="contador">0</span>/<span id="total">0</span>):
                </h4>
                <div id="lista-sorteados"></div>
            </div>
        </div>
    </div>

    <script>
        let maximo = null;
        let sorteados = [];
        let sorteando = false;

        function iniciarJogo(limite) {
            maximo = limite;
            sorteados = [];
            
            document.getElementById('tela-menu').style.display = 'none';
            document.getElementById('tela-jogo').style.display = 'block';
            
            document.getElementById('titulo-jogo').innerText = `Bingo (1 a ${maximo})`;
            document.getElementById('total').innerText = maximo;
            document.getElementById('numero-atual').innerText = '?';
            
            atualizarHistorico();
        }

        function mostrarPersonalizado() {
            document.getElementById('div-personalizado').style.display = 'block';
        }

        function iniciarPersonalizado() {
            const limite = parseInt(document.getElementById('input-limite').value);
            if (limite > 1) {
                iniciarJogo(limite);
            } else {
                alert("Por favor, insira um número válido.");
            }
        }

        function voltarMenu() {
            document.getElementById('tela-menu').style.display = 'block';
            document.getElementById('tela-jogo').style.display = 'none';
            document.getElementById('div-personalizado').style.display = 'none';
            document.getElementById('input-limite').value = '';
        }

        function sortearNumero() {
            if (sorteando) return; 

            if (sorteados.length >= maximo) {
                alert("Todos os números já foram sorteados!");
                return;
            }

            // Inicia o bloqueio e o giro
            sorteando = true;
            document.getElementById('btn-sortear').disabled = true;
            document.getElementById('btn-sortear').innerText = "Sorteando...";
            
            // Oculta o número atual para dar suspense
            document.getElementById('numero-atual').style.opacity = '0';
            
            const eixo = document.getElementById('eixo-bola');
            eixo.classList.add('girando'); // Inicia a animação CSS

            let novoSorteio;
            do {
                novoSorteio = Math.floor(Math.random() * maximo) + 1;
            } while (sorteados.includes(novoSorteio));

            sorteados.push(novoSorteio);
            sorteados.sort((a, b) => a - b);

            // Trava exata de 1.2 segundos (1200ms)
            setTimeout(() => {
                eixo.classList.remove('girando'); // Para de rolar
                
                // Mostra o novo número
                document.getElementById('numero-atual').innerText = novoSorteio;
                document.getElementById('numero-atual').style.opacity = '1';
                
                atualizarHistorico();

                // Libera o botão
                sorteando = false;
                document.getElementById('btn-sortear').disabled = false;
                document.getElementById('btn-sortear').innerText = "Sortear Número";
                
            }, 1200);
        }

        function atualizarHistorico() {
            document.getElementById('contador').innerText = sorteados.length;
            const listaHtml = sorteados.map(num => `<span class="numero-sorteado">${num}</span>`).join('');
            document.getElementById('lista-sorteados').innerHTML = listaHtml;
        }
    </script>
</body>
</html>
