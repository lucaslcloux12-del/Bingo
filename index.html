<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Realtime - Globo 3D</title>
    <style>
        /* ====== BASE E LAYOUT ====== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }

        h2, h3, h4 { margin-top: 0; }

        /* ====== CONTROLE DE TELAS ====== */
        .tela { display: none; }
        .tela.ativa { display: block; animation: fadeInTela 0.3s ease-in; }

        @keyframes fadeInTela {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ====== BOTÕES ====== */
        button {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
        }
        button:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .btn-secundario { background: #444; }
        .btn-sucesso { background: linear-gradient(to right, #11998e, #38ef7d); }
        .btn-acao { padding: 8px 12px; font-size: 14px; margin: 0; }
        
        .btn-lixeira {
            background: transparent;
            border: 1px solid #ff4b2b;
            color: white;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-lixeira:hover {
            background: rgba(255, 75, 43, 0.2);
        }

        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            text-align: center;
            width: 120px;
        }

        /* ====== CARTÕES DE HISTÓRICO ====== */
        .card-jogo {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-info h4 { margin: 0 0 5px 0; color: #ff4b2b; }
        .card-info p { margin: 0; font-size: 14px; color: #ccc; }
        .botoes-card { display: flex; gap: 8px; align-items: center; }


        /* ====== NOVO GLOBO DE BINGO 3D ====== */
        .globo-bingo-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto 40px auto;
            perspective: 1200px;
        }

        /* A Gaiola Redonda */
        .globo-gaiola {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px dashed rgba(255, 255, 255, 0.35);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.5));
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,255,255,0.15);
            transition: transform 0.2s;
        }

        /* Eixos de metal cruzados do globo */
        .globo-gaiola::before, .globo-gaiola::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
        .globo-gaiola::before { transform: rotateY(45deg); }
        .globo-gaiola::after { transform: rotateY(-45deg); }

        /* Bolinhas internas que ficam pulando e embaralhando */
        .bolinha-fundo {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.4);
            animation: embaralhar 1.4s infinite ease-in-out;
        }

        /* Animação padrão de mistura das bolinhas */
        @keyframes embaralhar {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(70px, -50px) scale(0.9); }
            50% { transform: translate(-60px, 70px) scale(1.1); }
            75% { transform: translate(50px, 60px) scale(0.8); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Quando clica em sortear, acelera tudo violentamente */
        .girando-globo {
            animation: tremerGlobo 0.1s infinite alternate;
        }
        .girando-globo .bolinha-fundo {
            animation-duration: 0.18s !important;
        }

        @keyframes tremerGlobo {
            from { transform: translate(2px, 1px) rotate(0deg); }
            to { transform: translate(-1px, -2px) rotate(1deg); }
        }

        /* ====== A BOLA QUE SAI VOANDO EM 3D ====== */
        .bola-sorteada-3d {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #ff4b2b 65%, #990000 100%);
            border-radius: 50%;
            top: 55px;
            left: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            z-index: 50;
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        /* Círculo branco com o número dentro da bola */
        .bola-sorteada-3d .rotulo-branco {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4b2b;
            font-size: 28px;
            font-weight: bold;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.4);
        }

        /* Animação da bola rolando em direção ao jogador */
        .bola-rolando {
            animation: rolarNaTela 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        @keyframes rolarNaTela {
            0% {
                transform: scale(0) rotate(0deg) translateY(0);
                opacity: 0;
            }
            40% {
                opacity: 1;
            }
            100% {
                /* Aumenta o tamanho (3D indo pra tela) e desce ligeiramente parando em destaque */
                transform: scale(1.5) rotate(720deg) translateY(35px);
                opacity: 1;
                box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            }
        }


        /* ====== CAIXA DE NÚMEROS SORTEADOS ====== */
        .historico-container {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
        }
        .numero-sorteado {
            display: inline-block;
            padding: 8px 12px;
            background-color: #ff4b2b;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            margin: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎱 Bingo 3D Realtime</h2>

        <div id="tela-login" class="tela ativa">
            <h3>Selecione sua conta:</h3>
            <div id="lista-usuarios" style="margin-top: 20px;"></div>
        </div>

        <div id="tela-menu" class="tela">
            <h3 id="bem-vindo-texto" style="color: #00d2ff;"></h3>
            
            <button onclick="mudarTela('tela-historico')" class="btn-secundario" style="margin-bottom: 25px; width: 100%;">
                📜 Ver Meus Jogos Anteriores
            </button>

            <h4>Começar um Novo Jogo:</h4>
            <div style="margin-bottom: 20px;">
                <button onclick="iniciarNovoJogo(50)">1 a 50</button>
                <button onclick="iniciarNovoJogo(75)">1 a 75</button>
                <button onclick="iniciarNovoJogo(100)">1 a 100</button>
                <button onclick="mostrarDivPersonalizado()">Personalizado</button>
            </div>

            <div id="div-personalizado" style="display: none; margin-bottom: 20px;">
                <input type="number" id="input-limite" placeholder="Ex: 200">
                <button onclick="iniciarJogoPersonalizado()">Criar</button>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <button onclick="fazerLogout()" style="background: transparent; border: 1px solid #555; color: #ccc;">Sair da Conta</button>
        </div>

        <div id="tela-historico" class="tela">
            <button onclick="mudarTela('tela-menu')" class="btn-secundario" style="margin-bottom: 20px;">⬅️ Voltar ao Menu</button>
            
            <h3>Seu Histórico de Jogos</h3>
            <div id="lista-jogos-salvos" style="max-height: 400px; overflow-y: auto; margin-top: 20px;"></div>
        </div>

        <div id="tela-jogo" class="tela">
            <button onclick="mudarTela('tela-menu')" class="btn-secundario" style="margin-bottom: 10px;">⬅️ Voltar ao Menu</button>
            <p style="font-size: 12px; color: #aaa; margin-top: 0;">(Sincronizando ao vivo na nuvem ☁️)</p>
            
            <h3 id="titulo-jogo"></h3>
            
            <div class="globo-bingo-container">
                <div class="globo-gaiola" id="globo-gaiola">
                    <div class="bolinha-fundo" style="top: 30%; left: 25%; background: #fff; animation-delay: -0.2s; animation-duration: 1.2s;"></div>
                    <div class="bolinha-fundo" style="top: 50%; left: 65%; background: #ffd700; animation-delay: -0.5s; animation-duration: 1.5s;"></div>
                    <div class="bolinha-fundo" style="top: 25%; left: 55%; background: #00d2ff; animation-delay: -0.9s; animation-duration: 1.3s;"></div>
                    <div class="bolinha-fundo" style="top: 65%; left: 35%; background: #ff416c; animation-delay: -1.1s; animation-duration: 1.6s;"></div>
                    <div class="bolinha-fundo" style="top: 45%; left: 45%; background: #38ef7d; animation-delay: -0.3s; animation-duration: 1.1s;"></div>
                    <div class="bolinha-fundo" style="top: 35%; left: 70%; background: #ff8c00; animation-delay: -0.7s; animation-duration: 1.4s;"></div>
                    <div class="bolinha-fundo" style="top: 60%; left: 20%; background: #928dab; animation-delay: -1.4s; animation-duration: 1.7s;"></div>
                    <div class="bolinha-fundo" style="top: 70%; left: 55%; background: #fff; animation-delay: -0.1s; animation-duration: 1.0s;"></div>
                </div>

                <div class="bola-sorteada-3d" id="bola-sorteada">
                    <div class="rotulo-branco">
                        <span id="numero-atual">?</span>
                    </div>
                </div>
            </div>
            
            <button id="btn-sortear" onclick="sortearNumero()" class="btn-sucesso" style="padding: 15px 30px; font-size: 20px; margin-bottom: 25px; width: 80%;">
                Sortear Número
            </button>

            <div class="historico-container">
                <h4 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px;">
                    Números Sorteados (<span id="contador">0</span>/<span id="total">0</span>):
                </h4>
                <div id="lista-sorteados"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfG1gFI4SoEdttmhwORZt92_9bgqJcsgw",
            authDomain: "call-9cc3b.firebaseapp.com",
            databaseURL: "https://call-9cc3b-default-rtdb.firebaseio.com",
            projectId: "call-9cc3b",
            storageBucket: "call-9cc3b.firebasestorage.app",
            messagingSenderId: "919168566449",
            appId: "1:919168566449:web:b57c4c4020bf3cace30e90",
            measurementId: "G-GYBCF1LG64"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.usuarios = [{ id: 1, nome: "Luiz Leão" }];
        window.usuarioAtual = null;
        window.jogoAtual = null; 
        window.todosOsJogos = [];
        window.sorteando = false;

        onValue(ref(db, 'jogos'), (snapshot) => {
            const data = snapshot.val();
            window.todosOsJogos = data ? Object.values(data) : [];
            
            window.todosOsJogos.forEach(j => {
                if (!j.sorteados) j.sorteados = [];
            });
            
            if (document.getElementById('tela-historico').classList.contains('ativa')) {
                window.renderizarHistoricoJogos();
            }

            if (window.jogoAtual && !window.sorteando) {
                const jogoAtualizado = window.todosOsJogos.find(j => j.id === window.jogoAtual.id);
                if (jogoAtualizado) {
                    window.jogoAtual = jogoAtualizado;
                    window.atualizarPlacarSorteados();
                    window.verificarStatusBotao();
                    
                    const bola = document.getElementById('bola-sorteada');
                    if (window.jogoAtual.sorteados.length > 0) {
                        document.getElementById('numero-atual').innerText = window.jogoAtual.sorteados[window.jogoAtual.sorteados.length - 1];
                        bola.classList.add('bola-rolando');
                    } else {
                        document.getElementById('numero-atual').innerText = '?';
                        bola.classList.remove('bola-rolando');
                        bola.style.opacity = '0';
                        bola.style.transform = 'scale(0)';
                    }
                }
            }
        });

        window.mudarTela = function(idTelaAlvo) {
            document.querySelectorAll('.tela').forEach(tela => tela.classList.remove('ativa'));
            document.getElementById(idTelaAlvo).classList.add('ativa');

            if (idTelaAlvo === 'tela-historico') {
                window.renderizarHistoricoJogos();
            }
            if (idTelaAlvo === 'tela-menu') {
                window.jogoAtual = null; 
                window.sorteando = false; 
            }
        }

        window.renderizarUsuarios = function() {
            const container = document.getElementById('lista-usuarios');
            container.innerHTML = '';
            window.usuarios.forEach(user => {
                const btn = document.createElement('button');
                btn.innerText = `👤 Entrar como ${user.nome}`;
                btn.style.width = '100%';
                btn.onclick = () => window.fazerLogin(user);
                container.appendChild(btn);
            });
        }

        window.fazerLogin = function(user) {
            window.usuarioAtual = user;
            document.getElementById('bem-vindo-texto').innerText = `Olá, ${user.nome}!`;
            window.mudarTela('tela-menu');
        }

        window.fazerLogout = function() {
            window.usuarioAtual = null;
            window.mudarTela('tela-login');
        }

        window.iniciarNovoJogo = function(limite) {
            const idGerado = Date.now().toString();
            const novoJogo = {
                id: idGerado,
                idUsuario: window.usuarioAtual.id,
                limite: limite,
                sorteados: [], 
                dataCriacao: new Date().toLocaleString('pt-BR')
            };

            set(ref(db, 'jogos/' + idGerado), novoJogo)
                .then(() => {
                    window.jogoAtual = novoJogo;
                    window.carregarJogoNaTela(novoJogo);
                })
                .catch(err => {
                    console.error(err);
                    alert("Erro nas regras do Firebase!");
                });
        }

        window.mostrarDivPersonalizado = function() {
            document.getElementById('div-personalizado').style.display = 'block';
        }

        window.iniciarJogoPersonalizado = function() {
            const limite = parseInt(document.getElementById('input-limite').value);
            if (limite > 1) {
                window.iniciarNovoJogo(limite);
                document.getElementById('div-personalizado').style.display = 'none';
                document.getElementById('input-limite').value = '';
            } else {
                alert("Por favor, insira um número válido.");
            }
        }

        window.carregarJogoNaTela = function(jogo) {
            window.jogoAtual = jogo;
            if(!window.jogoAtual.sorteados) window.jogoAtual.sorteados = [];
            
            window.mudarTela('tela-jogo');
            document.getElementById('titulo-jogo').innerText = `Bingo (1 a ${jogo.limite})`;
            document.getElementById('total').innerText = jogo.limite;
            
            const bola = document.getElementById('bola-sorteada');
            if (jogo.sorteados.length > 0) {
                document.getElementById('numero-atual').innerText = jogo.sorteados[jogo.sorteados.length - 1];
                bola.classList.add('bola-rolando');
            } else {
                document.getElementById('numero-atual').innerText = '?';
                bola.classList.remove('bola-rolando');
                bola.style.opacity = '0';
                bola.style.transform = 'scale(0)';
            }

            window.atualizarPlacarSorteados();
            window.verificarStatusBotao();
        }

        // --- LÓGICA DO NOVO SORTEIO 3D COM GLOBO ---
        window.sortearNumero = function() {
            if (window.sorteando || !window.jogoAtual) return; 
            if (!window.jogoAtual.sorteados) window.jogoAtual.sorteados = [];

            if (window.jogoAtual.sorteados.length >= window.jogoAtual.limite) {
                alert("Todos os números já foram sorteados!");
                return;
            }

            window.sorteando = true;
            const btnSortear = document.getElementById('btn-sortear');
            btnSortear.disabled = true;
            btnSortear.innerText = "Embaralhando...";
            
            // Esconde e encolhe a bola principal imediatamente para prepará-la para o novo salto
            const bola = document.getElementById('bola-sorteada');
            bola.classList.remove('bola-rolando');
            bola.style.opacity = '0';
            bola.style.transform = 'scale(0)';

            // Ativa o modo rápido das bolinhas internas e treme a gaiola
            document.getElementById('globo-gaiola').classList.add('girando-globo');

            let novoSorteio;
            do {
                novoSorteio = Math.floor(Math.random() * window.jogoAtual.limite) + 1;
            } while (window.jogoAtual.sorteados.includes(novoSorteio));

            const copiaSorteados = [...window.jogoAtual.sorteados, novoSorteio];

            update(ref(db, 'jogos/' + window.jogoAtual.id), {
                sorteados: copiaSorteados
            })
            .then(() => {
                // Tempo para manter o globo agitando na tela antes de soltar a bola sorteada
                setTimeout(() => {
                    document.getElementById('globo-gaiola').classList.remove('girando-globo');
                    
                    window.jogoAtual.sorteados = copiaSorteados;
                    document.getElementById('numero-atual').innerText = novoSorteio;
                    
                    // A bola sai de dentro do globo e rola em direção à tela do jogador
                    bola.classList.add('bola-rolando');
                    
                    window.atualizarPlacarSorteados();
                    window.verificarStatusBotao();

                    window.sorteando = false;
                }, 1300);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('globo-gaiola').classList.remove('girando-globo');
                window.verificarStatusBotao();
                window.sorteando = false;
            });
        }

        window.atualizarPlacarSorteados = function() {
            const lista = window.jogoAtual.sorteados || [];
            document.getElementById('contador').innerText = lista.length;
            
            const arrayOrdenado = [...lista].sort((a, b) => a - b);
            const listaHtml = arrayOrdenado.map(num => `<span class="numero-sorteado">${num}</span>`).join('');
            document.getElementById('lista-sorteados').innerHTML = listaHtml;
        }

        window.verificarStatusBotao = function() {
            const lista = window.jogoAtual.sorteados || [];
            const btnSortear = document.getElementById('btn-sortear');
            if (lista.length >= window.jogoAtual.limite) {
                btnSortear.disabled = true;
                btnSortear.innerText = "Sorteio Finalizado";
            } else {
                btnSortear.disabled = false;
                btnSortear.innerText = "Sortear Número";
            }
        }

        window.renderizarHistoricoJogos = function() {
            const container = document.getElementById('lista-jogos-salvos');
            container.innerHTML = '';

            const jogosDoUsuario = window.todosOsJogos
                .filter(j => j.idUsuario === window.usuarioAtual.id)
                .reverse(); 

            if (jogosDoUsuario.length === 0) {
                container.innerHTML = '<p style="color: #ccc;">Nenhum jogo encontrado.</p>';
                return;
            }

            jogosDoUsuario.forEach(jogo => {
                const listaSorteados = ServerSorteados(jogo);
                const finalizado = listaSorteados.length === jogo.limite;
                const card = document.createElement('div');
                card.className = 'card-jogo';
                
                card.innerHTML = `
                    <div class="card-info">
                        <h4>Bingo de 1 a ${jogo.limite}</h4>
                        <p>🗓️ ${jogo.dataCriacao}</p>
                        <p>🎱 Sorteados: ${listaSorteados.length} / ${jogo.limite}</p>
                    </div>
                    <div class="botoes-card">
                        <button class="${finalizado ? 'btn-secundario' : 'btn-sucesso'} btn-acao" onclick="retomarJogo('${jogo.id}')">
                            ${finalizado ? '👁️ Ver' : '▶️ Seguir'}
                        </button>
                        <button class="btn-lixeira" onclick="excluirJogo('${jogo.id}')" title="Apagar Jogo">
                            🗑️
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function ServerSorteados(jogo) {
            return jogo.sorteados || [];
        }

        window.retomarJogo = function(idDoJogo) {
            const jogoEncontrado = window.todosOsJogos.find(j => j.id === idDoJogo);
            if (jogoEncontrado) {
                window.carregarJogoNaTela(jogoEncontrado);
            }
        }

        window.excluirJogo = function(idDoJogo) {
            if (confirm("Tem certeza que deseja apagar este jogo? Esta ação não pode ser desfeita.")) {
                remove(ref(db, 'jogos/' + idDoJogo)).catch(err => alert("Erro ao apagar: " + err));
            }
        }

        window.renderizarUsuarios();
    </script>
</body>
</html>
